<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Recognizer</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
        }
        canvas {
            border: 2px solid white;
            background-color: black;
            cursor: crosshair;
        }
        .controls {
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
        }
        #prediction {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>MNIST Recognizer</h1>
    <canvas id="canvas" width="500" height="500"></canvas>
    <div class="controls">
        <button onclick="clearCanvas()">Borrar</button>
        <button onclick="predict()">Predecir</button>
    </div>
    <p id="prediction"></p>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let drawing = false;

        // Inicializar canvas
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Eventos de dibujo
        canvas.addEventListener("mousedown", () => drawing = true);
        canvas.addEventListener("mouseup", () => drawing = false);
        canvas.addEventListener("mousemove", draw);
        canvas.addEventListener("touchstart", (e) => {
            drawing = true;
            e.preventDefault();
        });
        canvas.addEventListener("touchend", () => drawing = false);
        canvas.addEventListener("touchmove", draw);

        function draw(event) {
            if (!drawing) return;
            event.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const x = (event.clientX || event.touches[0].clientX) - rect.left;
            const y = (event.clientY || event.touches[0].clientY) - rect.top;

            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, Math.PI * 2);
            ctx.fill();
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById("prediction").innerText = "";
        }

        async function predict() {
            const API_ENDPOINT = "http://localhost:3000/predict";
            document.getElementById("prediction").innerText = "Procesando...";

            try {
                const imageData = canvas.toDataURL("image/png");
                const blob = dataURLtoBlob(imageData);

                const formData = new FormData();
                formData.append("file", blob, "image.png");

                const response = await fetch(API_ENDPOINT, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("prediction").innerText = `Predicción: ${data.prediction}`;
                } else {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById("prediction").innerText = "Error al predecir";
            }
        }

        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(",");
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            const u8arr = new Uint8Array(bstr.length);

            for (let i = 0; i < bstr.length; i++) {
                u8arr[i] = bstr.charCodeAt(i);
            }

            return new Blob([u8arr], { type: mime });
        }
    </script>
</body>
</html>
